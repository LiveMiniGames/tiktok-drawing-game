<!DOCTYPE html>
<html>
<head>
  <title>TikTok Drawing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <div class="controls">
      <h1>Host Controls</h1>

      <button id="connectBtn">Connect TikFinity</button>
      <div id="connectionStatus">Not connected</div>

      <hr>

      <label>Mode</label>
      <select id="mode">
        <option value="drawing">Drawing</option>
        <option value="charades">Charades</option>
      </select>

      <label>Rounds</label>
      <select id="roundCount">
        <option value="5">5 rounds</option>
        <option value="10">10 rounds</option>
        <option value="20">20 rounds</option>
      </select>

      <label>Timer</label>
      <select id="timerSeconds">
        <option value="30">30 seconds</option>
        <option value="60">1 minute</option>
        <option value="120">2 minutes</option>
      </select>

      <label>Custom Word</label>
      <input id="customWord" placeholder="Type custom word">

      <button id="randomWordBtn">Random Word</button>
      <button id="startGameBtn">Start Game</button>
      <button id="nextRoundBtn">Next Round</button>
      <button id="endGameBtn">End Game</button>

      <h2>Secret Word</h2>
      <div id="secretWord">---</div>

      <hr>

      <label>Preset Colors</label>
      <div class="color-presets">
        <button class="color-dot" data-color="#ffffff" style="background:#ffffff"></button>
        <button class="color-dot" data-color="#ff0000" style="background:#ff0000"></button>
        <button class="color-dot" data-color="#00ff66" style="background:#00ff66"></button>
        <button class="color-dot" data-color="#0099ff" style="background:#0099ff"></button>
        <button class="color-dot" data-color="#ffff00" style="background:#ffff00"></button>
        <button class="color-dot" data-color="#ff7b00" style="background:#ff7b00"></button>
        <button class="color-dot" data-color="#b300ff" style="background:#b300ff"></button>
        <button class="color-dot" data-color="#ff4fd8" style="background:#ff4fd8"></button>
        <button class="color-dot" data-color="#000000" style="background:#000000"></button>
      </div>

      <label>Custom Color</label>
      <input type="color" id="brushColor" value="#ffffff">

      <label>Brush Size</label>
      <input type="range" id="brushSize" min="2" max="35" value="8">

      <button id="eraserBtn">Eraser Off</button>
      <button id="clearBtn">Clear Drawing</button>

      <hr>

      <h2>Test Guess</h2>
      <input id="testUsername" placeholder="username">
      <input id="testGuess" placeholder="guess">
      <button id="testGuessBtn">Send Test Guess</button>

      <hr>

      <h2>Session Leaderboard</h2>
      <div id="hostLeaderboard"></div>
    </div>

    <div class="stream-area">
      <div class="stream-card">
        <div class="topbar">
          <div id="roundText">ROUND 0/0</div>
          <div id="timerText">0:00</div>
        </div>

        <div class="draw-wrap">
          <canvas id="canvas" width="520" height="420"></canvas>

          <div id="charadesBox" class="charades hidden">
            <div class="charades-title">🎭 CHARADES ROUND</div>
            <div class="charades-subtitle">Streamer acts it out. Chat guesses the answer!</div>
          </div>

          <div id="winnerPopup" class="winner hidden">
            <div class="small-label">CORRECT ANSWER:</div>
            <div id="winnerAnswer">---</div>
            <div class="tiktok-line">
              <span class="tiktok-logo">♪</span>
              <span id="winnerName">---</span>
            </div>
            <div class="got-first">GOT IT FIRST!</div>
          </div>

          <div id="timesUpPopup" class="timesup hidden">
            <div class="timesup-title">TIME'S UP!</div>
            <div class="small-label">CORRECT ANSWER:</div>
            <div id="timesUpAnswer">---</div>
            <div class="no-one">NO ONE GOT IT!</div>
          </div>
        </div>

        <div id="finalLeaderboard" class="final hidden"></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
