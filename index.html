<!DOCTYPE html>
<html>
<head>
  <title>TikTok Drawing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="controls">
      <h1>Host Controls</h1>

      <button id="connectBtn" type="button">Connect TikFinity</button>
      <div id="connectionStatus" class="status">Not connected</div>

      <hr>

      <label>Mode</label>
      <select id="mode">
        <option value="drawing">Drawing</option>
        <option value="charades">Charades</option>
      </select>

      <label>Rounds</label>
      <select id="roundCount">
        <option value="5">5 rounds</option>
        <option value="10">10 rounds</option>
        <option value="20">20 rounds</option>
      </select>

      <label>Timer</label>
      <select id="timerSeconds">
        <option value="30">30 seconds</option>
        <option value="60">1 minute</option>
        <option value="120">2 minutes</option>
      </select>

      <label>Custom Word</label>
      <input id="customWord" placeholder="Optional custom word">

      <button id="randomWordBtn" type="button">Get Random Word</button>
      <button id="startGameBtn" type="button">Start Game</button>
      <button id="nextRoundBtn" type="button">Next Round</button>
      <button id="endGameBtn" type="button">End Game</button>

      <h2>Secret Word</h2>
      <div id="secretWord">---</div>

      <hr>

      <label>Brush Color Presets</label>
      <div class="preset-grid" id="brushPresets">
        <button type="button" class="preset active" data-type="brush" data-color="#ffffff" style="background:#ffffff"></button>
        <button type="button" class="preset" data-type="brush" data-color="#111111" style="background:#111111"></button>
        <button type="button" class="preset" data-type="brush" data-color="#ef4444" style="background:#ef4444"></button>
        <button type="button" class="preset" data-type="brush" data-color="#f97316" style="background:#f97316"></button>
        <button type="button" class="preset" data-type="brush" data-color="#facc15" style="background:#facc15"></button>
        <button type="button" class="preset" data-type="brush" data-color="#22c55e" style="background:#22c55e"></button>
        <button type="button" class="preset" data-type="brush" data-color="#06b6d4" style="background:#06b6d4"></button>
        <button type="button" class="preset" data-type="brush" data-color="#3b82f6" style="background:#3b82f6"></button>
        <button type="button" class="preset" data-type="brush" data-color="#8b5cf6" style="background:#8b5cf6"></button>
        <button type="button" class="preset" data-type="brush" data-color="#ec4899" style="background:#ec4899"></button>
        <button type="button" class="preset" data-type="brush" data-color="#a16207" style="background:#a16207"></button>
        <button type="button" class="preset" data-type="brush" data-color="#94a3b8" style="background:#94a3b8"></button>
      </div>

      <label>Custom Brush Color</label>
      <input type="color" id="brushColor" value="#ffffff">

      <label>Background Color Presets</label>
      <div class="preset-grid" id="bgPresets">
        <button type="button" class="preset active" data-type="bg" data-color="#ffffff" style="background:#ffffff"></button>
        <button type="button" class="preset" data-type="bg" data-color="#111111" style="background:#111111"></button>
        <button type="button" class="preset" data-type="bg" data-color="#ef4444" style="background:#ef4444"></button>
        <button type="button" class="preset" data-type="bg" data-color="#f97316" style="background:#f97316"></button>
        <button type="button" class="preset" data-type="bg" data-color="#facc15" style="background:#facc15"></button>
        <button type="button" class="preset" data-type="bg" data-color="#22c55e" style="background:#22c55e"></button>
        <button type="button" class="preset" data-type="bg" data-color="#06b6d4" style="background:#06b6d4"></button>
        <button type="button" class="preset" data-type="bg" data-color="#3b82f6" style="background:#3b82f6"></button>
        <button type="button" class="preset" data-type="bg" data-color="#8b5cf6" style="background:#8b5cf6"></button>
        <button type="button" class="preset" data-type="bg" data-color="#ec4899" style="background:#ec4899"></button>
        <button type="button" class="preset" data-type="bg" data-color="#a16207" style="background:#a16207"></button>
        <button type="button" class="preset" data-type="bg" data-color="#94a3b8" style="background:#94a3b8"></button>
      </div>

      <label>Custom Background Color</label>
      <input type="color" id="bgColor" value="#ffffff">
      <button id="applyBgBtn" type="button">Apply Background</button>

      <label>Brush Size</label>
      <input type="range" id="brushSize" min="2" max="44" value="8">

      <button id="eraserBtn" type="button">Eraser Off</button>
      <button id="clearBtn" type="button">Clear Drawing</button>

      <hr>

      <h2>Test Guess</h2>
      <input id="testUsername" placeholder="username">
      <input id="testGuess" placeholder="guess">
      <button id="testGuessBtn" type="button">Send Test Guess</button>

      <hr>

      <h2>Session Leaderboard</h2>
      <div id="hostLeaderboard"></div>
    </aside>

    <main class="stream-area">
      <section class="stream-card" id="streamCard">
        <div class="topbar">
          <div id="roundText">ROUND 0/0</div>
          <div id="timerText" class="timer-ok">0:00</div>
        </div>

        <div class="draw-wrap" id="drawWrap">
          <canvas id="canvas" width="520" height="420"></canvas>

          <div id="charadesBox" class="charades hidden">
            <div class="charades-kicker">CHARADES ROUND</div>
            <div class="charades-title">Act It Out</div>
            <div class="charades-subtitle">Chat guesses the answer in TikTok chat</div>
          </div>

          <div id="winnerPopup" class="winner hidden">
            <div class="popup-label">CORRECT ANSWER:</div>
            <div id="winnerAnswer" class="popup-answer">---</div>
            <div id="winnerName" class="winner-user">@---</div>
            <div id="winnerPoints" class="winner-points">GOT IT FIRST!</div>
          </div>

          <div id="timesUpPopup" class="timesup hidden">
            <div class="timesup-title">TIME'S UP!</div>
            <div class="popup-label">CORRECT ANSWER:</div>
            <div id="timesUpAnswer" class="popup-answer">---</div>
            <div class="no-one">NO ONE GOT IT RIGHT!</div>
          </div>
        </div>

        <div id="finalLeaderboard" class="final hidden"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
