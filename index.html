<!DOCTYPE html>
<html>
<head>
  <title>TikTok Drawing Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <aside class="controls">
    <h1>Host Controls</h1>

    <button onclick="connectTikFinity()">Connect TikFinity</button>
    <div id="connectionStatus" class="status">Not connected</div>

    <hr>

    <label>Mode</label>
    <select id="mode">
      <option value="drawing">Drawing</option>
      <option value="charades">Charades</option>
    </select>

    <label>Rounds</label>
    <select id="roundCount">
      <option value="5">5 rounds</option>
      <option value="10">10 rounds</option>
      <option value="20">20 rounds</option>
    </select>

    <label>Timer</label>
    <select id="timerSeconds">
      <option value="30">30 seconds</option>
      <option value="60">1 minute</option>
      <option value="120">2 minutes</option>
    </select>

    <label>Custom Word</label>
    <input id="customWord" placeholder="Optional custom word">

    <button onclick="pickRandomWord()">Get Random Word</button>
    <button onclick="startGame()">Start Game</button>
    <button onclick="nextRound()">Next Round</button>
    <button onclick="endGame(true)">End Game</button>

    <h2>Secret Word</h2>
    <div id="secretWord">---</div>

    <hr>

    <label>Brush Color Presets</label>
    <div class="preset-grid">
      <button class="preset active" onclick="setBrush('#ffffff', this)" style="background:#ffffff"></button>
      <button class="preset" onclick="setBrush('#111111', this)" style="background:#111111"></button>
      <button class="preset" onclick="setBrush('#ef4444', this)" style="background:#ef4444"></button>
      <button class="preset" onclick="setBrush('#f97316', this)" style="background:#f97316"></button>
      <button class="preset" onclick="setBrush('#facc15', this)" style="background:#facc15"></button>
      <button class="preset" onclick="setBrush('#22c55e', this)" style="background:#22c55e"></button>
      <button class="preset" onclick="setBrush('#06b6d4', this)" style="background:#06b6d4"></button>
      <button class="preset" onclick="setBrush('#3b82f6', this)" style="background:#3b82f6"></button>
      <button class="preset" onclick="setBrush('#8b5cf6', this)" style="background:#8b5cf6"></button>
      <button class="preset" onclick="setBrush('#ec4899', this)" style="background:#ec4899"></button>
      <button class="preset" onclick="setBrush('#a16207', this)" style="background:#a16207"></button>
      <button class="preset" onclick="setBrush('#94a3b8', this)" style="background:#94a3b8"></button>
    </div>

    <label>Custom Brush Color</label>
    <input type="color" id="brushColor" value="#ffffff">

    <label>Background Color Presets</label>
    <div class="preset-grid">
      <button class="preset active" onclick="setBg('#ffffff', this)" style="background:#ffffff"></button>
      <button class="preset" onclick="setBg('#111111', this)" style="background:#111111"></button>
      <button class="preset" onclick="setBg('#ef4444', this)" style="background:#ef4444"></button>
      <button class="preset" onclick="setBg('#f97316', this)" style="background:#f97316"></button>
      <button class="preset" onclick="setBg('#facc15', this)" style="background:#facc15"></button>
      <button class="preset" onclick="setBg('#22c55e', this)" style="background:#22c55e"></button>
      <button class="preset" onclick="setBg('#06b6d4', this)" style="background:#06b6d4"></button>
      <button class="preset" onclick="setBg('#3b82f6', this)" style="background:#3b82f6"></button>
      <button class="preset" onclick="setBg('#8b5cf6', this)" style="background:#8b5cf6"></button>
      <button class="preset" onclick="setBg('#ec4899', this)" style="background:#ec4899"></button>
      <button class="preset" onclick="setBg('#a16207', this)" style="background:#a16207"></button>
      <button class="preset" onclick="setBg('#94a3b8', this)" style="background:#94a3b8"></button>
    </div>

    <label>Custom Background Color</label>
    <input type="color" id="bgColor" value="#ffffff">
    <button onclick="applyCustomBg()">Apply Background</button>

    <label>Brush Size</label>
    <input type="range" id="brushSize" min="2" max="44" value="8">

    <button onclick="toggleEraser()" id="eraserBtn">Eraser Off</button>
    <button onclick="clearDrawing()">Clear Drawing</button>

    <hr>

    <h2>Test Guess</h2>
    <input id="testUsername" placeholder="username">
    <input id="testGuess" placeholder="guess">
    <button onclick="sendTestGuess()">Send Test Guess</button>

    <hr>

    <h2>Session Leaderboard</h2>
    <div id="hostLeaderboard"></div>
  </aside>

  <main class="stream-area">
    <section class="stream-card">
      <div class="topbar">
        <div id="roundText">ROUND 0/0</div>
        <div id="timerText" class="timer-ok">0:00</div>
      </div>

      <div class="draw-wrap" id="drawWrap">
        <canvas id="canvas" width="520" height="420"></canvas>

        <div id="charadesBox" class="charades hidden">
          <div class="charades-title">🎭 CHARADES ROUND</div>
          <div class="charades-subtitle">Streamer acts it out. Chat guesses the answer!</div>
        </div>

        <div id="winnerPopup" class="popup-screen correct hidden">
          <div class="popup-card">
            <div class="popup-kicker">CORRECT ANSWER</div>
            <div id="winnerAnswer" class="popup-answer">---</div>
          </div>
          <div class="popup-card dark-card">
            <div id="winnerName" class="popup-user">@---</div>
            <div id="winnerPoints" class="popup-sub">GOT IT FIRST!</div>
          </div>
        </div>

        <div id="timesUpPopup" class="popup-screen timeout hidden">
          <div class="times-title">TIME'S UP!</div>
          <div class="popup-card">
            <div class="popup-kicker">CORRECT ANSWER</div>
            <div id="timesUpAnswer" class="popup-answer">---</div>
          </div>
          <div class="no-one">NO ONE GOT IT RIGHT!</div>
        </div>
      </div>

      <div id="finalLeaderboard" class="final hidden"></div>
    </section>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
